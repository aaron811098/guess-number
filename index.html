<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>猜數字 1A2B</title><link rel="icon" href="assets/favicon.svg" type="image/svg+xml"><link rel="stylesheet" href="css/style.css"></head><body><main class="page"><section class="hero card"><div class="hero__top"><div><p class="eyebrow">1A2B Number Game</p><h1>猜數字</h1><p class="subtitle">4 位數，1～9 隨機不重複。數字與位置都對是 A，數字對但位置錯是 B。</p></div><button id="themeToggle" class="icon-btn" type="button" aria-label="切換深色模式">🌙</button></div><div class="stats"><div><span id="attempts">0</span><small>猜測次數</small></div><div><span id="timer">00:00</span><small>計時</small></div><div><span id="bestRecord">--</span><small>最佳紀錄</small></div></div></section><section class="game card"><div class="input-row"><input class="digit" inputmode="numeric" maxlength="1"><input class="digit" inputmode="numeric" maxlength="1"><input class="digit" inputmode="numeric" maxlength="1"><input class="digit" inputmode="numeric" maxlength="1"></div><p id="message" class="message">請輸入 1～9 的四個不重複數字。</p><div class="actions"><button id="guessBtn" class="primary" type="button">送出猜測</button><button id="restartBtn" class="secondary" type="button">重新開始</button></div></section><section class="history card"><div class="section-title"><h2>猜測紀錄</h2><button id="copyBtn" class="link-btn" type="button">複製紀錄</button></div><div class="table-wrap"><table><thead><tr><th>#</th><th>猜測</th><th>結果</th></tr></thead><tbody id="historyBody"><tr class="empty"><td colspan="3">尚未開始猜測</td></tr></tbody></table></div></section></main><div id="toast" class="toast" role="status" aria-live="polite"></div><script src="js/app.js"></script></body></html>
